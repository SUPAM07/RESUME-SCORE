# ============================================================
# ResumeLM Observability Stack
# Jaeger (distributed tracing), Prometheus (metrics), Grafana (dashboards),
# Loki (log aggregation), and Promtail (log shipping).
#
# Usage:
#   docker compose \
#     -f docker/docker-compose.microservices.yml \
#     -f docker/docker-compose.observability.yml \
#     up -d
#
# Access:
#   Jaeger UI    → http://localhost:16686
#   Prometheus   → http://localhost:9090
#   Grafana      → http://localhost:3001  (admin / admin)
# ============================================================

services:
  # ── Distributed tracing ───────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: resumelm-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=warn
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Jaeger collector (HTTP)
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    networks:
      - resumelm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:16686/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Metrics collection ────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: resumelm-prometheus
    volumes:
      - ../infrastructure/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    ports:
      - "9090:9090"
    networks:
      - resumelm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Log aggregation ───────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.0
    container_name: resumelm-loki
    volumes:
      - ../infrastructure/observability/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - resumelm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Log shipping (Docker log driver → Loki) ───────────────────────────────
  promtail:
    image: grafana/promtail:3.2.0
    container_name: resumelm-promtail
    volumes:
      - ../infrastructure/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - resumelm-network
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy

  # ── Dashboards ────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.0
    container_name: resumelm-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_HTTP_PORT=3001
    volumes:
      - ../infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3001"
    networks:
      - resumelm-network
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prometheus-data:
  loki-data:
  grafana-data:

networks:
  resumelm-network:
    external: true
