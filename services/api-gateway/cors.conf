# ============================================================
# ResumeLM API Gateway — CORS configuration
# Include this file from nginx.conf inside the relevant server{} block:
#
#   include /etc/nginx/conf.d/cors.conf;
#
# The $cors_origin variable is set by a map block so that only
# explicitly listed origins receive CORS headers.
# ============================================================

# ── Origin allow-list ─────────────────────────────────────────────────────
# Add production and staging origins here.  Wildcards are intentionally
# NOT used to prevent credential-bearing cross-origin requests from
# unexpected sources.
map $http_origin $cors_origin {
    default                  "";
    "http://localhost:3000"  $http_origin;
    "http://localhost:80"    $http_origin;
    # Add production domains below, e.g.:
    # "https://resumelm.com"      $http_origin;
    # "https://app.resumelm.com"  $http_origin;
}

# ── Preflight handler ─────────────────────────────────────────────────────
# Nginx does not have a built-in "handle OPTIONS" directive, so we use a
# conditional in the main server block.  Mount this location inside the
# server{} context:
#
#   location / {
#     if ($request_method = OPTIONS) {
#       include /etc/nginx/conf.d/cors-preflight.conf;
#     }
#     ...
#   }
#
# The cors-preflight.conf snippet is defined below as inline comments for
# operators to copy into their location blocks as needed.

# ── CORS response headers ─────────────────────────────────────────────────
# Add these to every proxied location block:
#
#   add_header "Access-Control-Allow-Origin"      $cors_origin always;
#   add_header "Access-Control-Allow-Methods"     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
#   add_header "Access-Control-Allow-Headers"     "Authorization, Content-Type, X-Request-ID" always;
#   add_header "Access-Control-Allow-Credentials" "true" always;
#   add_header "Access-Control-Max-Age"           "86400" always;
#   add_header "Vary"                             "Origin" always;
