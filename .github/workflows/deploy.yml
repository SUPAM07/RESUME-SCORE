name: CD — Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, production]
      service:
        description: "Target service (leave empty to deploy all)"
        required: false

env:
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GKE_CLUSTER: resume-score-cluster
  GKE_ZONE: us-central1
  PNPM_VERSION: "9.15.0"

jobs:
  # ─── Build & Push Docker Images ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    strategy:
      matrix:
        service:
          - name: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - name: api-gateway
            context: .
            dockerfile: services/api-gateway/Dockerfile
          - name: resume-service
            context: .
            dockerfile: services/resume-service/Dockerfile
          - name: user-service
            context: .
            dockerfile: services/user-service/Dockerfile
          - name: notification-service
            context: .
            dockerfile: services/notification-service/Dockerfile
          - name: search-service
            context: .
            dockerfile: services/search-service/Dockerfile
          - name: auth-service
            context: services/auth-service
            dockerfile: services/auth-service/Dockerfile
          - name: ai-service
            context: services/ai-service
            dockerfile: services/ai-service/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/resume-score/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/resume-score/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Kubernetes ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: Deploy via Helm
        run: |
          ENV=${{ github.event.inputs.environment || 'staging' }}
          IMAGE_TAG=${{ github.sha }}
          
          helm upgrade --install resume-score ./helm \
            --namespace resume-score-${ENV} \
            --create-namespace \
            --values ./helm/values.${ENV}.yaml \
            --set global.imageTag=${IMAGE_TAG} \
            --set global.registry=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/resume-score \
            --wait \
            --timeout 10m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway -n resume-score-${{ github.event.inputs.environment || 'staging' }}
          kubectl rollout status deployment/resume-service -n resume-score-${{ github.event.inputs.environment || 'staging' }}
