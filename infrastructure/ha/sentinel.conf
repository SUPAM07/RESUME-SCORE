# Redis Sentinel configuration for ResumeLM HA setup
# Used by sentinel1, sentinel2, sentinel3 containers.

# Monitor the primary Redis instance
# quorum=2 means 2 out of 3 sentinels must agree before failover
sentinel monitor resumelm-master redis-primary 6379 2

# Password for the master (and replicas)
sentinel auth-pass resumelm-master changeme

# Time (ms) a master must be unreachable before failover is considered
sentinel down-after-milliseconds resumelm-master 5000

# Timeout for the failover process
sentinel failover-timeout resumelm-master 60000

# Number of replicas that can be reconfigured in parallel during failover
sentinel parallel-syncs resumelm-master 1

# Sentinel bind address and port
port 26379
bind 0.0.0.0
